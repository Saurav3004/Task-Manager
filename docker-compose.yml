version: "3.9"

services:
  mongo:
    image: mongo
    container_name: task-manager-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--quiet"]

  backend:
    build: ./backend
    container_name: task-manager-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/task-manager
      - JWT_SECRET=supersecretkey
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongo_data: