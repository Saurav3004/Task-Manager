version: "3.9"

services:
  mongo:
    image: mongo
    container_name: task-manager-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: task-manager-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/task-manager
      - JWT_SECRET=supersecretkey

volumes:
  mongo_data: